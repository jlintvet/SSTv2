name: Daily MUR SST Retrieval

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrieve-sst:
    name: Fetch MUR SST and commit
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: ${{ env.pythonLocation }}/bin/pip install -r requirements.txt

      - name: Run DailySSTRetrieval.py
        run: ${{ env.pythonLocation }}/bin/python DailySSTRetrieval.py

      - name: Commit DailySST data to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add DailySST/

          if git diff --cached --quiet; then
            echo "No changes to commit — files are already up to date."
          else
            git commit -m "chore: daily MUR SST update $(date -u '+%Y-%m-%d')"
            git push
          fi
