name: SST Data Fetch

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Most recent date to fetch (YYYY-MM-DD). Script collects the 5 days ending on this date. Defaults to yesterday if blank.'
        required: false
        default: ''
      sources:
        description: 'Which sources to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - goes_only
          - viirs_only
          - mur_only

permissions:
  contents: write

jobs:
  fetch-sst:
    name: Fetch SST Data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas netCDF4

      - name: Resolve target date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$INPUT_DATE" ]; then
            echo "date=$(date -u -d '2 days ago' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          else
            echo "date=$INPUT_DATE" >> $GITHUB_OUTPUT
          fi

      - name: Remove stale GOES Hourly files
        run: |
          # The old pipeline replicated one daily snapshot into 24 identical
          # hourly CSVs. The new pipeline writes real VIIRS per-pass files
          # instead. Remove the fake hourly directory entirely if it exists.
          if [ -d "DailySSTData/GOES/Hourly" ]; then
            rm -rf DailySSTData/GOES/Hourly
            echo "Removed stale DailySSTData/GOES/Hourly/"
          else
            echo "DailySSTData/GOES/Hourly/ not present — nothing to remove"
          fi

      - name: Fetch SST data
        env:
          TARGET_DATE_OVERRIDE: ${{ steps.date.outputs.date }}
          SOURCES_OVERRIDE:     ${{ github.event.inputs.sources || 'all' }}
          PYTHONUNBUFFERED:     "1"
        run: |
          echo "Target date : ${{ steps.date.outputs.date }}"
          echo "Sources     : ${{ github.event.inputs.sources || 'all' }}"
          echo ""
          echo "Note: MUR and GOES via NOAA CoastWatch ERDDAP (no auth)."
          echo "      VIIRS via STAR NESDIS NRT file server (no auth)."
          echo ""
          python -u sst_data_fetcher.py 2>&1 | tee sst_fetch.log

      - name: Debug output
        if: always()
        run: |
          echo "====== DailySSTData/ ======"
          find DailySSTData/ -type f 2>/dev/null | sort || echo "!! DailySSTData/ does not exist"
          echo ""
          echo "====== Fetch log (last 100 lines) ======"
          tail -100 sst_fetch.log 2>/dev/null || echo "!! No log file"

      - name: Verify outputs exist
        run: |
          count=$(find DailySSTData/ -type f -name "*.csv" 2>/dev/null | wc -l)
          echo "Output CSV count: $count"

          mur_count=$(find DailySSTData/MUR/ -name "*.csv" 2>/dev/null | wc -l)
          goes_count=$(find DailySSTData/GOES/Composite/ -name "*.csv" 2>/dev/null | wc -l)
          viirs_count=$(find DailySSTData/VIIRS/Passes/ -name "*.csv" 2>/dev/null | wc -l)

          echo "  MUR files        : $mur_count"
          echo "  GOES composite   : $goes_count"
          echo "  VIIRS passes     : $viirs_count"

          if [ "$count" -eq 0 ]; then
            echo "::error::No SST data files produced. Check the log above."
            exit 1
          fi

          if [ "$mur_count" -eq 0 ]; then
            echo "::warning::No MUR files produced."
          fi
          if [ "$goes_count" -eq 0 ]; then
            echo "::warning::No GOES composite files produced."
          fi
          if [ "$viirs_count" -eq 0 ]; then
            echo "::warning::No VIIRS pass files produced — check netCDF4 install and file server URL."
          fi

      - name: Clean up stale non-CSV artifacts
        run: |
          # Remove old Parquet/GeoJSON/_grid.json files left over from previous
          # pipeline versions. The current script writes CSV only.
          deleted=0
          for pattern in "*.parquet" "*.geojson" "*_grid.json"; do
            while IFS= read -r f; do
              [ -n "$f" ] && rm -f "$f" && deleted=$((deleted+1))
            done < <(find DailySSTData/ -type f -name "$pattern" 2>/dev/null)
          done
          echo "Removed $deleted stale non-CSV files."

      - name: List outputs
        run: |
          echo "=== DailySSTData/ contents ==="
          find DailySSTData/ -type f | sort
          echo ""
          du -sh DailySSTData/ 2>/dev/null || true

      - name: Commit SST data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage all data changes — includes new files, removals of stale
          # Hourly CSVs, and new VIIRS pass files
          git add DailySSTData/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: SST update ${{ steps.date.outputs.date }}"
          git push origin HEAD

      - name: Commit fetch log to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p DailySSTData/logs
          cp sst_fetch.log DailySSTData/logs/sst_fetch_${{ steps.date.outputs.date }}.log 2>/dev/null || true
          git add DailySSTData/logs/ 2>/dev/null || true
          git diff --cached --quiet && echo "No log changes" || \
            git commit -m "log: SST fetch log ${{ steps.date.outputs.date }}"
          git push origin HEAD 2>/dev/null || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::SST fetch failed for ${{ steps.date.outputs.date }}"
          echo "Check the log output above for details."
