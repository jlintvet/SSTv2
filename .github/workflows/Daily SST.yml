name: Daily MUR + ACSPO SST Retrieval
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  retrieve-sst:
    name: Fetch MUR + ACSPO SST and commit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          which python
          python --version
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip
          python -m pip install requests urllib3
          python -m pip show requests
      - name: Run DailySSTRetrieval.py
        run: python DailySSTRetrieval.py
      - name: Commit DailySST data to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DailySST/
          if git diff --cached --quiet; then
            echo "No changes to commit — files are already up to date."
          else
            git commit -m "chore: daily MUR + ACSPO SST update $(date -u '+%Y-%m-%d')"
            git push
          fi
