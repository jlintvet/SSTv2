name: Daily MUR + GOES-19 SST Retrieval
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  retrieve-sst:
    name: Fetch MUR + GOES-19 SST and commit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests urllib3 numpy regionmask contourpy

      - name: Run StaticLayersRetrieval.py (only if outputs are missing)
        run: |
          NEEDED=0
          for f in DailySST/bathymetry_contours.json DailySST/noaa_coastline.json DailySST/landmask.json; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              NEEDED=1
            fi
          done
          if [ "$NEEDED" = "1" ]; then
            echo "Static layer files missing — running StaticLayersRetrieval.py"
            python StaticLayersRetrieval.py
          else
            echo "All static layer files present — skipping StaticLayersRetrieval.py"
          fi

      - name: Run DailySSTRetrieval.py
        run: python DailySSTRetrieval.py

      - name: Commit DailySST data to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DailySST/
          if git diff --cached --quiet; then
            echo "No changes to commit — files are already up to date."
          else
            git commit -m "chore: daily MUR + GOES-19 SST update $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
