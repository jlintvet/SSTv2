name: Bake Ocean Mask

on:
  workflow_dispatch:
  push:
    paths:
      - "bake_ocean_mask.py"

permissions:
  contents: write   # 👈 THIS FIXES YOUR ERROR

jobs:
  bake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install --upgrade pip
          pip install requests

      - run: python bake_ocean_mask.py

      - name: Commit generated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add DailySSTData/ocean_mask.json
          git commit -m "Update ocean mask" || echo "No changes"
          git push
