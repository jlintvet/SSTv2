name: SST Data Fetch

on:
  schedule:
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to fetch (YYYY-MM-DD). Defaults to yesterday if blank.'
        required: false
        default: ''
      sources:
        description: 'Which sources to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mur_only
          - viirs_only
          - cmems_only

jobs:
  fetch-sst:
    name: Fetch SST Data
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            xarray \
            netCDF4 \
            numpy \
            pandas \
            pyarrow \
            copernicusmarine

      - name: Resolve target date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$INPUT_DATE" ]; then
            echo "date=$(date -u -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          else
            echo "date=$INPUT_DATE" >> $GITHUB_OUTPUT
          fi

      - name: Check credentials and config
        env:
          CMEMS_USER:     ${{ secrets.CMEMS_USER }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: |
          echo "CMEMS_USER set:     $( [ -n "$CMEMS_USER" ]     && echo YES || echo NO )"
          echo "CMEMS_PASSWORD set: $( [ -n "$CMEMS_PASSWORD" ] && echo YES || echo NO )"
          echo "Target date:        ${{ steps.date.outputs.date }}"
          echo "Sources:            ${{ github.event.inputs.sources || 'all' }}"

      # Secrets are passed explicitly per-step — this is the reliable pattern
      - name: Fetch SST data
        env:
          CMEMS_USER:           ${{ secrets.CMEMS_USER }}
          CMEMS_PASSWORD:       ${{ secrets.CMEMS_PASSWORD }}
          TARGET_DATE_OVERRIDE: ${{ steps.date.outputs.date }}
          SOURCES_OVERRIDE:     ${{ github.event.inputs.sources || 'all' }}
          PYTHONUNBUFFERED:     "1"
        run: |
          python -u sst_data_fetcher.py 2>&1 | tee sst_fetch.log

      - name: Debug output
        if: always()
        run: |
          echo "====== Repo root ======"
          ls -lah
          echo ""
          echo "====== sst_data/ ======"
          ls -lah sst_data/ 2>/dev/null || echo "!! sst_data/ does not exist"
          echo ""
          echo "====== Fetch log (last 150 lines) ======"
          tail -150 sst_fetch.log 2>/dev/null || echo "!! No log file"

      - name: Verify outputs exist
        run: |
          count=$(find sst_data/ -type f 2>/dev/null | wc -l)
          echo "Output file count: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No SST data files produced. Check the sst-fetch-log artifact."
            exit 1
          fi

      - name: Upload SST data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sst-data-${{ steps.date.outputs.date }}
          path: sst_data/
          retention-days: 90
          if-no-files-found: error

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sst-fetch-log-${{ steps.date.outputs.date }}
          path: sst_fetch.log
          retention-days: 7
          if-no-files-found: ignore

      # ── Optional: commit data to a 'data' branch ──────────────────────────────
      # - name: Commit data to repository
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "data: SST update ${{ steps.date.outputs.date }}"
      #     branch: data
      #     file_pattern: sst_data/*.geojson sst_data/*.parquet sst_data/*.csv
      #     create_branch: true

      # ── Optional: push to S3 ─────────────────────────────────────────────────
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region:            us-east-1
      #
      # - name: Push data to S3
      #   run: |
      #     DATE="${{ steps.date.outputs.date }}"
      #     aws s3 sync sst_data/ s3://YOUR_BUCKET/sst/$DATE/ \
      #       --exclude "*.nc" \
      #       --content-type "application/json" \
      #       --cache-control "max-age=86400"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::SST fetch failed for ${{ steps.date.outputs.date }}"
          echo "Download the sst-fetch-log artifact for full details."
