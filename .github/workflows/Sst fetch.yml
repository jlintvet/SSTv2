name: SST Data Fetch

on:
  schedule:
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to fetch (YYYY-MM-DD). Defaults to yesterday if blank.'
        required: false
        default: ''
      sources:
        description: 'Which sources to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mur_only
          - viirs_only
          - cmems_only

jobs:
  fetch-sst:
    name: Fetch SST Data
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            xarray \
            netCDF4 \
            numpy \
            pandas \
            pyarrow \
            copernicusmarine

      - name: Resolve target date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$INPUT_DATE" ]; then
            echo "date=$(date -u -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          else
            echo "date=$INPUT_DATE" >> $GITHUB_OUTPUT
          fi

      # ── Credential check — tells you exactly what to fix if secrets are missing
      - name: Check credentials
        env:
          CMEMS_USER:     ${{ secrets.CMEMS_USER }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: |
          echo "Target date : ${{ steps.date.outputs.date }}"
          echo "Sources     : ${{ github.event.inputs.sources || 'all' }}"
          echo ""
          if [ -z "$CMEMS_USER" ] || [ -z "$CMEMS_PASSWORD" ]; then
            echo "⚠️  CMEMS secrets not set — CMEMS source will be skipped."
            echo "   To fix: repo → Settings → Secrets and variables → Actions"
            echo "   Add secret: CMEMS_USER     = your Copernicus username"
            echo "   Add secret: CMEMS_PASSWORD = your Copernicus password"
            echo "   Register free at https://marine.copernicus.eu"
          else
            echo "✓ CMEMS_USER set"
            echo "✓ CMEMS_PASSWORD set"
          fi
          echo ""
          echo "Note: MUR + ACSPO VIIRS + Geo-polar Blended run without any credentials."

      # ── Secrets passed explicitly on the step that needs them ─────────────────
      - name: Fetch SST data
        env:
          CMEMS_USER:           ${{ secrets.CMEMS_USER }}
          CMEMS_PASSWORD:       ${{ secrets.CMEMS_PASSWORD }}
          TARGET_DATE_OVERRIDE: ${{ steps.date.outputs.date }}
          SOURCES_OVERRIDE:     ${{ github.event.inputs.sources || 'all' }}
          PYTHONUNBUFFERED:     "1"
        run: |
          python -u sst_data_fetcher.py 2>&1 | tee sst_fetch.log

      - name: Debug output
        if: always()
        run: |
          echo "====== sst_data/ ======"
          ls -lah sst_data/ 2>/dev/null || echo "!! sst_data/ does not exist"
          echo ""
          echo "====== Fetch log (last 100 lines) ======"
          tail -100 sst_fetch.log 2>/dev/null || echo "!! No log file"

      - name: Verify outputs exist
        run: |
          count=$(find sst_data/ -type f 2>/dev/null | wc -l)
          echo "Output file count: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No SST data files produced. Check the sst-fetch-log artifact."
            exit 1
          fi

      # Organize into DailySST/{date}/ folder for clean storage
      - name: Organize into DailySST folder
        run: |
          DATE="${{ steps.date.outputs.date }}"
          mkdir -p DailySST/$DATE
          # Copy only data files (not raw .nc scratch files)
          find sst_data/ -type f \( -name "*.geojson" -o -name "*.csv" -o -name "*.parquet" -o -name "*_grid.json" \)             -exec cp {} DailySST/$DATE/ \;
          echo "=== DailySST/$DATE/ contents ==="
          ls -lah DailySST/$DATE/

      - name: Upload SST data to DailySST
        uses: actions/upload-artifact@v4
        with:
          name: DailySST
          path: DailySST/
          retention-days: 90
          if-no-files-found: error

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sst-fetch-log-${{ steps.date.outputs.date }}
          path: sst_fetch.log
          retention-days: 7
          if-no-files-found: ignore

      # ── Optional: commit data to a 'data' branch ──────────────────────────────
      # - name: Commit data to repository
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "data: SST update ${{ steps.date.outputs.date }}"
      #     branch: data
      #     file_pattern: sst_data/*.geojson sst_data/*.parquet sst_data/*.csv
      #     create_branch: true

      # ── Optional: push to S3 ─────────────────────────────────────────────────
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region:            us-east-1
      #
      # - name: Push data to S3
      #   run: |
      #     DATE="${{ steps.date.outputs.date }}"
      #     aws s3 sync sst_data/ s3://YOUR_BUCKET/sst/$DATE/ \
      #       --content-type "application/json" \
      #       --cache-control "max-age=86400"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::SST fetch failed for ${{ steps.date.outputs.date }}"
          echo "Download the sst-fetch-log artifact for full details."
